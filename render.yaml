services:
  - type: web
    name: zetta-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /health
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zetta-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: zetta-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LOG_LEVEL
        value: INFO

  - type: worker
    name: zetta-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    branch: main
    autoDeployTrigger: commit
    dockerCommand: celery -A app.core.celery_app.celery_app worker --loglevel=info --pool=threads --concurrency=4
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zetta-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: zetta-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CELERY_WORKER_POOL
        value: threads
      - key: CELERY_WORKER_CONCURRENCY
        value: 4
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: zetta-frontend
    runtime: node
    rootDir: frontend
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: BACKEND_HOSTPORT
        fromService:
          type: web
          name: zetta-backend
          property: hostport

  - type: keyvalue
    name: zetta-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: zetta-postgres
    databaseName: zetta
    user: zetta
    plan: basic-256mb
    ipAllowList: []
